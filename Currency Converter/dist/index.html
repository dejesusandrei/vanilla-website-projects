<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-slate-800 flex justify-center items-center min-h-screen p-3">
    <div class="bg-slate-100 min-w-16 sm:min-w-1/4 p-4 rounded-lg">
        <!-- Image Logo -->
        <div class="flex-center flex-col gap-5">
            <img class="max-w-14 md:max-w-24" src="/Currency Converter/assets/images/money.png" alt="Money Currency Converter Image">
            <h1 class="font-semibold font-poppins text-[18px] md:text-2xl">CURRENCY CONVERTER</h1>
        </div>
        <!-- Inputs -->
        <div class="mt-5 flex flex-col gap-4">
            <label class="font-poppins font-medium text-[13px] sm:text-sm" for="amount">Amount:</label>
            <input class="border-b px-2 py-2 outline-0 font-medium font-sans text-[17px]" type="text" id="amount" placeholder="Enter Amount">
            <p class="pl-2 mb-3 text-red-500" id="error"></p>
        </div>
        <!-- Drop Down -->
        <div class="grid grid-cols-1 sm:grid-cols-2 sm:gap-4 gap-3 mt-5">
            <select class="bg-blue-300 border border-slate-400 px-2 py-1.5 rounded-[5px] overflow-hidden focus:outline-0" id="from-currency"></select>
            <select class="bg-blue-300 border border-slate-400 px-2 py-1.5 rounded-[5px] overflow-hidden focus:outline-0" id="to-currency"></select>           
        </div>
        <!-- Button -->
        <div class="flex-center mt-5">
            <button class="bg-blue-300 border border-slate-400 px-4 py-2 rounded-[5px] w-full cursor-pointer" id="exhange-btn">Get Exchange Rate</button>
        </div>
        <!-- Result -->
        <div class="flex-center gap-3 mt-5 px-4 py-3 hidden bg-blue-200 rounded-[5px] border border-slate-400" id="result">
        </div>
    </div>

    <script src="../script/script.js" type="module"></script>
</body>
</html>
