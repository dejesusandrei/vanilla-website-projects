<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSpend</title>
    <link rel="stylesheet" href="style/main.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo-container">
                <div class="logo">
                    <a href="userDashboard.html" target="_self" title="SmartSpend Home"><img src="svg/wallet-logo.svg" alt="SmartSpend Logo"></a>
                </div>
                <div class="logo-text">
                    <h3>SmartSpend</h3>
                </div>
                <div class="toggle">
                    <button class="toggle-bar" id="toggle-bar"><img src="svg/bars.svg" alt="Toggle bar"></button>
                </div>
            </div>
            <div class="user-container">
                <div class="toggle-notif">
                    <button class="toggle-bar" id="toggle-notif"><img src="svg/notif-bell.svg" alt="Toggle notification"></button>
                </div>
                <div class="user-logo">
                    <h4 id="user-logo-text"></h4>
                </div>
                <div class="user-name">
                    <p id="user-name"></p>
                </div>
            </div>
        </nav>
    </header>

    <aside class="side-bar">
        <div class="sidebar-list">
            <div class="sidebar-links">
                <img src="svg/home.svg" alt="Home icon" class="icon home normal-icon">
                <img src="svg/home-hover.svg" alt="Home icon" class="icon hover-icon">
                <h4 class="h4-hover">Dashboard</h4>
            </div>
            <div class="sidebar-links">
                <img src="svg/list.svg" alt="List icon" class="icon list normal-icon">
                <img src="svg/list-hover.svg" alt="List icon" class="icon list hover-icon">
                <h4 class="h4-hover">Transaction</h4>
            </div>
            <div class="sidebar-links">
                <img src="svg/plus.svg" alt="Plus icon" class="icon plus normal-icon">
                <img src="svg/plus-hover.svg" alt="Plus icon" class="icon plus hover-icon">
                <h4 class="h4-hover">Add Transacrtion</h4>
            </div>
            <div class="sidebar-links">
                <img src="svg/tags.svg" alt="Tags icon" class="icon tags normal-icon">
                <img src="svg/tags-hover.svg" alt="Tags icon" class="icon tags hover-icon">
                <h4 class="h4-hover">Caregories</h4>
            </div>
            <div class="sidebar-links">
                <img src="svg/wallet-green.svg" alt="Wallet icon" class="icon income normal-icon">
                <img src="svg/wallet-logo.svg" alt="Wallet icon" class="icon hover-icon">
                <h4 class="h4-hover">Income</h4>
            </div>
        </div>

        <div class="sidebar-log-out">
            <div class="sidebar-links">
                <img src="svg/logout.svg" alt="Logout icon" class="logout icon normal-icon">
                <img src="svg/logout-hover.svg" alt="logout icon" class="icon hover-icon">
                <h4 class="h4-hover">Logout</h4>
            </div>
        </div>
    </aside>

    <main>
        <section>
            haha
        </section>
    </main>

    <script src="script/userDashbaord.js" type="module"></script>
</body>
</html>
