<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSpend</title>
    <link rel="stylesheet" href="style/main.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo-container">
                <div class="logo">
                    <a href="userDashboard.html" target="_self" title="SmartSpend Home"><img src="svg/wallet-logo.svg" alt="SmartSpend Logo"></a>
                </div>
                <div class="logo-text">
                    <h3>SmartSpend</h3>
                </div>
                <div class="toggle">
                    <button class="toggle-bar" id="toggle-bar"><img src="svg/bars.svg" alt="Toggle bar"></button>
                </div>
            </div>
            <div class="user-container">
                <div class="toggle-notif">
                    <button class="toggle-bar" id="toggle-notif"><img src="svg/notif-bell.svg" alt="Toggle notification"></button>
                </div>
                <div class="user-logo">
                    <h3 id="user-logo-text">U</h3>
                </div>
                <div class="user-name">
                    <p id="user-name">User</p>
                </div>
            </div>
        </nav>
    </header>
</body>
</html>
