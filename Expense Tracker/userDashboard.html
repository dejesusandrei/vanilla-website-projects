<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSpend</title>
    <link rel="stylesheet" href="style/main.css">
</head>
<body id="body">
    <header>
        <nav>
            <div class="logo-container">
                <div class="logo" id="logo-container">
                    <a href="userDashboard.html" target="_self" title="SmartSpend Home"><img src="svg/wallet-logo.svg" alt="SmartSpend Logo"></a>
                </div>
                <div class="logo-text" id="logo-text">
                    <h3>SmartSpend</h3>
                </div>
                <div class="toggle" id="toggle-container">
                    <button class="toggle-bar" id="toggle-bar"><img src="svg/bars.svg" alt="Toggle bar"></button>
                    <button class="toggle-bar x" id="toggle-x"><img src="svg/x.svg" alt="X bar"></button>
                </div>
            </div>
            
            <div class="user-container">
                <div class="toggle-notif">
                    <button class="toggle-bar" id="toggle-notif"><img src="svg/notif-bell.svg" alt="Toggle notification"></button>
                </div>
                <div class="user-logo">
                    <h4 id="user-logo-text"></h4>
                </div>
                <div class="user-name">
                    <p id="user-name"></p>
                </div>
            </div>
        </nav>
    </header>

    <aside class="side-bar">
        <div class="sidebar-list">
            <div class="sidebar-links">
                <div class="icon-container">
                    <img src="svg/home.svg" alt="Home icon" class="icon home normal-icon">
                    <img src="svg/home-hover.svg" alt="Home icon" class="icon hover-icon">
                </div>
                <h4 class="h4-hover collapse">Dashboard</h4>
            </div>
            <div class="sidebar-links">
                <div class="icon-container">
                    <img src="svg/list.svg" alt="List icon" class="icon list normal-icon">
                    <img src="svg/list-hover.svg" alt="List icon" class="icon list hover-icon">
                </div>
                <h4 class="h4-hover collapse">Transaction</h4>
            </div>
            <div class="sidebar-links">
                <div class="icon-container">
                    <img src="svg/plus.svg" alt="Plus icon" class="icon plus normal-icon">
                    <img src="svg/plus-hover.svg" alt="Plus icon" class="icon plus hover-icon">
                </div>
                <h4 class="h4-hover collapse">Add Transaction</h4>
            </div>
            <div class="sidebar-links">
                <div class="icon-container">
                    <img src="svg/tags.svg" alt="Tags icon" class="icon tags normal-icon">
                    <img src="svg/tags-hover.svg" alt="Tags icon" class="icon tags hover-icon">
                </div>
                <h4 class="h4-hover collapse">Categories</h4>
            </div>
        </div>

        <div class="sidebar-log-out">
            <div class="sidebar-links">
                <div class="icon-container">
                    <img src="svg/logout.svg" alt="Logout icon" class="logout icon normal-icon">
                    <img src="svg/logout-hover.svg" alt="logout icon" class="icon hover-icon">
                </div>
                <h4 class="h4-hover collapse">Logout</h4>
            </div>
        </div>
    </aside>

    <main>
        <section class="dashboard-section sections" id="dashboard">
            <div class="title-section">
                <div class="section-text">
                    <h1>Dashboard</h1>
                </div>
                <div class="section-description">
                    <p>Overview of your finances</p>
                </div>
            </div>

            <!-- Total income -->
            <div class="expenses-section">
                <div class="income-container expenses">
                    <div class="wallet-logo green">
                        <img src="svg/wallet-green.svg" alt="Wallet icon">
                    </div>

                    <div class="income-content total-expenses">
                        <div class="income-text">
                            <p>Total Income</p>
                        </div>
                        <div class="money-container">
                            <h2>₱ 15,000.00</h2>
                        </div>
                        <div class="compared-percentage green-box">
                            <div class="icon-box">
                                <img src="svg/arrow-green.svg" alt="Arrow up icon">
                            </div>
                            <div class="percentage-text">
                                <p class="green-t">12.5%</p>
                            </div>
                        </div>
                        <div class="compared-text">
                            <p>vs last month</p>
                        </div>
                    </div>

                </div>

                <!-- Total Expenses -->
                <div class="expenses-container expenses">
                    <div class="wallet-logo red">
                        <img src="svg/wallet-red.svg" alt="Wallet icon">
                    </div>

                    <div class="income-content total-expenses">
                        <div class="income-text">
                            <p>Total Expenses</p>
                        </div>
                        <div class="money-container">
                            <h2>₱ 14,000.00</h2>
                        </div>
                        <div class="compared-percentage red-box">
                            <div class="icon-box">
                                <img src="svg/arrow-red.svg" alt="Arrow up icon">
                            </div>
                            <div class="percentage-text">
                                <p class="red-t">12.5%</p>
                            </div>
                        </div>
                        <div class="compared-text">
                            <p>vs last month</p>
                        </div>
                    </div>

                </div>

                <!-- Total balance -->
                <div class="balance-container expenses">
                    <div class="wallet-logo blue">
                        <img src="svg/wallet-blue.svg" alt="Wallet icon">
                    </div>
                    
                    <div class="income-content total-expenses">
                        <div class="income-text">
                            <p>Balance</p>
                        </div>
                        <div class="money-container">
                            <h2>₱ 1,000.00</h2>
                        </div>
                        <div class="compared-percentage blue-box">
                            <div class="icon-box">
                                <img src="svg/arrow-blue.svg" alt="Arrow up icon">
                            </div>
                            <div class="percentage-text">
                                <p class="blue-t">12.5%</p>
                            </div>
                        </div>
                        <div class="compared-text">
                            <p>vs last month</p>
                        </div>
                    </div>

                </div>
            </div>

        </section>
    </main>

    <script src="script/userDashbaord.js" type="module"></script>
</body>
</html>
