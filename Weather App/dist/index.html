<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-slate-900 flex-center min-h-screen px-2 py-5">
    <!-- Container -->
    <div class="min-w-80 px-2 py-7 flex flex-col items-center rounded-xl bg-linear-to-br from-emerald-400 via-cyan-400 to-indigo-500" id="container">

        <!-- Search Bar -->
        <div class="mt-2 flex-center items-center gap-3">
            <input class="px-4 py-2.5 rounded-3xl bg-white outline-0 font-poppins text-[14px]" type="text" id="city" placeholder="Search">
            <button class="flex-center cursor-pointer items-center rounded-full w-10 h-10 bg-white" id="search"><img class="w-5" src="../icon/search.svg" alt="Search icon"></button>
        </div>

        <!-- Weather Container -->
        <div class="flex-center flex-col mt-7 w-3/4">
            <!-- Weather Condition -->
            <div class="w-32 flex-center items-center" id="weather">
                
            </div>
            <!-- Celcius -->
            <div class="mt-8">
                <h1 class="text-7xl font-poppins font-semibold text-white" id="degree">22°c</h1>
            </div>
            <!-- Country / Place -->
            <div class="mt-3">
                <h2 class="text-4xl text-white font-mono font-medium" id="place">New York</h2>
            </div>
        </div>

        <!-- Humidity and Wind -->
        <div class="grid grid-cols-2 gap-4 mt-2 w-[90%]">
            <div class="flex justify-start items-center gap-2">
                <img class="w-9 cursor-pointer" src="../icon/humidity.png" alt="Humidity">
                <div class="felx flex-col items-center justify-center">
                    <h3 class="text-white font-poppins font-medium text-lg mt-6" id="humidity">64%</h3>
                    <p class="text-sm text-white">Humidity</p>
                </div>
            </div>
            <div class="flex justify-start items-center gap-2">
                <img class="w-7 cursor-pointer" src="../icon/wind.png" alt="Wind">
                <div class="felx flex-col items-center justify-center">
                    <h3 class="text-white font-poppins font-medium text-lg mt-6" id="wind">64km/h</h3>
                    <p class="text-sm text-white">Wind Speed</p>
                </div>
            </div>
        </div>

    </div>

    <script src="../script/script.js" type="module"></script>
</body>
</html>
